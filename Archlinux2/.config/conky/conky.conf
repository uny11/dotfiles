
-- Conky para Qtile by Isaac

conky.config ={
  -- CONKY SETTINGS
  background = true,
  update_interval = 1,
  total_run_times = 0,
  
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  
  override_utf8_locale = true,
  
  double_buffer = true,
  no_buffers = true,
  
  text_buffer_size = 32768,
  
  -- CONKY: WINDOW SPECIFICATIONS
  own_window = true,
  own_window_argb_value = 50,
  own_window_argb_visual = true,
  own_window_class = 'Conky',
  own_window_title = 'TwistedConky',
  own_window_colour = '#0b0d18',
  own_window_hints = 'undecorated,below,above,sticky,skip_taskbar,skip_pager',
  own_window_transparent = false,
  own_window_type = 'override',

  border_inner_margin = 6,
  border_width = 5, 

  minimum_height = 1920,

  minimum_width = 450,
  maximum_width = 450,

  alignment = 'top_left',
  xinerama_head = 2,
  gap_x = 10,
  gap_y = 880,

  -- GRAPHICS SETTINGS
  draw_shades = false,
  draw_outline = true,
  draw_borders = false,
  draw_graph_borders = true,

  -- TEXT SETTINGS
  use_xft = true,
  font = 'Mononoki:size=14',
  xftalpha = 0.2,

  uppercase = false,

  -- Pad percentages to this many decimals (0 = no padding)
  pad_percents = 2,

  -- COLOUR SETTINGS
  default_color = 'AAAAAA',
  default_shade_color = '333333',
  default_outline_color = '010101',
  --color1 = '836398', #violeta
  --color1 = '81a1c1', #azul
  color1 = 'd08770',
  color2 = 'CCCCCC',
  color3 = 'EEEEEE',
  color4 = '444444',
  color5 = '555555',
  color6 = 'FFFFFF',
  color7 = '00ff00',      -- Green
  color8 = 'ff3300',      -- Red  
};

conky.text = [[
${alignc}${color1}${font Font Awesome 7 Brands:size=25}${exec echo -e "\ue867"}${font Mononoki Bold:size=20}rch by ${font Mononoki Bold:size=25}Q${font Mononoki Bold:size=20}tile${voffset -20}

${alignc}${color1}${font Mononoki Bold:size=18}${time %H:%M}${font}${color}${alignr}
${voffset -20}
${alignc}${font Mononoki Light:size=14}${color1}${time %A %d %B %Y}${font}${alignr}
${color6}${hr 2}${color} 
#${voffset -20}
${goto 10}${color1}${font Font Awesome 7 Brands:size=16}${exec echo -e "\uf17c"}${font Mononoki Light:size=14}${color1} KERNEL:${color}${font} ${alignr}$kernel
${goto 10}${color1}${font UbuntuMono Nerd Font:size=16}${exec echo -e "\ue383"}${font Mononoki Light:size=14}${color1}  UPTIME:${color}${font} ${alignr}$uptime_short
#-- ${font Mononoki Light:size=14}${color1}SISTEMA:${color}${font} ${alignr}ArchLinux 
#-- ${font Mononoki Light:size=14}${color1}IP PUBLICA:${color}${font} ${alignr}${exec curl -s www.icanhazip.com}
${goto 10}${color1}${font UbuntuMono Nerd Font:size=16}${exec echo -e "\uf1eb"}${font Mononoki Light:size=14}${color1}   IP PRIVADA:${color}${font} ${alignr}${addr wlan0}
${goto 10}${color1}${font UbuntuMono Nerd Font:size=16}${exec echo -e "\uf4bc"}${font :size=14}${font Mononoki Light:size=14}${color1}   GPU:${color}${font} ${goto 100}${color}${alignr}${nvidia modelname}${color}${font}
${goto 10}${color1}${font UbuntuMono Nerd Font:size=16}${exec echo -e "\uf4bc"}${font}${font Mononoki Light:size=14}${color1}   CPU TEMP: ${font Mononoki Light:size=14}${color}${font} ${alignr}${execi 5 sensors|grep 'Package id 0'| awk -F'+' '{print $2}' | awk -F'.' '{print $1}'} °C ${color}
${goto 10}${color1}${font UbuntuMono Nerd Font:size=16}${exec echo -e "\uf0a0"}${font}${font Mononoki Light:size=14}${color1}   NVMe TEMP: ${font Mononoki Light:size=14}${color}${font}${alignr}${execi 5 sensors | grep Composite: | awk '{gsub(/\+/, ""); print $2}' | tr '\n' ' '}

${color1}${font UbuntuMono Nerd Font:size=18}${exec echo -e "\uf11c"}${font :size=16}${color1}    SHORTCUTS ${color6}${hr 2}${color}
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+[Ctrl]+r  ${goto 180}${color}->  Qtile Restart
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+[Ctrl]+q  ${goto 180}${color}->  Qtile Exit
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+[Ctrl]+b  ${goto 180}${color}->  Bloquear Pantalla
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+[tab]  	${goto 180}${color}->  Cambiar Layout
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+ .  		${goto 180}${color}->  Cambiar Focus de Pantalla
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+m  		${goto 180}${color}->  Menu
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+b  		${goto 180}${color}->  Brave
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+c  		${goto 180}${color}->  VSCode
${goto 20}${font Mononoki:normal:size=14}${color1}[Win]+Enter 		${goto 180}${color}->  Terminal

${color1}${font UbuntuMono Nerd Font:size=18}${exec echo -e "\ueba2"}${font :size=16}${color1}   PROCESSES ${color6}${hr 2}${color}
#${voffset -20}
${font Mononoki Light:size=14}${color1}Nombre: ${goto 200}MEMORIA: ${goto 380}CPU: ${color}${font}
${font Mononoki Light:size=14}${color1}${top_mem name 1} ${color}${goto 190}${top mem 1} % ${goto 370}${top cpu 1} % ${font} 
${font Mononoki Light:size=14}${color1}${top_mem name 2} ${color}${goto 190}${top mem 2} % ${goto 370}${top cpu 2} % ${font}
${font Mononoki Light:size=14}${color1}${top_mem name 3} ${color}${goto 190}${top mem 3} % ${goto 370}${top cpu 3} % ${font}
${font Mononoki Light:size=14}${color1}${top_mem name 4} ${color}${goto 190}${top mem 4} % ${goto 370}${top cpu 4} % ${font}
${font Mononoki Light:size=14}${color1}${top_mem name 5} ${color}${goto 190}${top mem 5} % ${goto 370}${top cpu 5} % ${font}
# ${font Mononoki Light:size=14}${color1}${top_mem name 6} ${color}${goto 190}${top mem 6} % ${goto 370}${top cpu 6} % ${font}
# ${font Mononoki Light:size=14}${color1}${top_mem name 7} ${color}${goto 190}${top mem 7} % ${goto 370}${top cpu 7} % ${font}
# ${font Mononoki Light:size=14}${color1}${top_mem name 8} ${color}${goto 190}${top mem 8} % ${goto 370}${top cpu 8} % ${font}
# ${font Mononoki Light:size=14}${color1}${top_mem name 9} ${color}${goto 190}${top mem 9} % ${goto 370}${top cpu 9} % ${font}
# ${font Mononoki Light:size=14}${color1}${top_mem name 10} ${color}${goto 190}${top mem 10} % ${goto 370}${top cpu 10} % ${font}

${color1}${font Font Awesome 7 Brands:size=16}${exec echo -e "\ue867"}${font :size=16}${color1} SISTEMA ${color6}${hr 2}${color}
#${voffset -20}
${font Mononoki Light:size=14}${color1}Memoria RAM: ${color}${goto 220}${memperc}% used ${color}${goto 300} ${mem} / ${memmax} 
${font Mononoki Light:size=14}${color1}/dev/nvme1n1p5 ${color}   / ${goto 185}${fs_free /} free${goto 305}${fs_used /} / ${fs_size /}
${voffset -20}
# ${font Mononoki Light:size=14}${color1}RED: ${color} ${goto 365}${wireless_essid eno2}
# ${wireless_link_qual_perc eno2} ${wireless_link_bar eno2}
# ${font Mononoki Light:size=14}${color}${goto 50}Bajada: ${goto 150}${downspeed eno2} ${downspeedgraph eno2}
# ${font Mononoki Light:size=14}${color}${goto 50}Subida: ${goto 150}${upspeed eno2} ${upspeedgraph eno2}
# ${font Mononoki Light:size=14}${color}${goto 50}Total: ${goto 305}${totaldown eno2} / ${totalup eno2}
${font Mononoki Light:size=14}${color1}RED: ${color} ${goto 365}${wireless_essid wlan0}
${wireless_link_qual_perc wlan0} ${wireless_link_bar wlan0}
${font Mononoki Light:size=14}${color}${goto 50}Bajada: ${goto 150}${downspeed wlan0} ${downspeedgraph wlan0}
${font Mononoki Light:size=14}${color}${goto 50}Subida: ${goto 150}${upspeed wlan0} ${upspeedgraph wlan0}
${font Mononoki Light:size=14}${color}${goto 50}Total: ${goto 305}${totaldown wlan0} / ${totalup wlan0}

${color}${font Mononoki Light:size=12}${goto 350}by Isaac Porta${color}${font} ${voffset 6}
]];